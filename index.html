<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой День</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="dashboard" class="screen active">
        <header class="header">
            <h1>Мой День</h1>
            <div class="date" id="currentDate">Загрузка...</div>
        </header>
        
        <main class="dashboard-grid">
            <div class="card" onclick="navigateTo('sleep')">
                <div class="card-icon">😴</div>
                <div class="card-content">
                    <h3>Сон</h3>
                    <p id="sleep-hours">0 часов</p>
                </div>
            </div>

            <div class="card" onclick="navigateTo('water')">
                <div class="card-icon">💧</div>
                <div class="card-content">
                    <h3>Вода</h3>
                    <p id="water-amount">0 мл</p>
                </div>
            </div>

            <div class="card" onclick="navigateTo('steps')">
                <div class="card-icon">👟</div>
                <div class="card-content">
                    <h3>Шаги</h3>
                    <p id="steps-count">0 шагов</p>
                </div>
            </div>

            <div class="card" onclick="navigateTo('mood')">
                <div class="card-icon">😊</div>
                <div class="card-content">
                    <h3>Настроение</h3>
                    <p id="mood-status">😊</p>
                </div>
            </div>

            <div class="card" onclick="navigateTo('medicine')">
                <div class="card-icon">💊</div>
                <div class="card-content">
                    <h3>Лекарства</h3>
                    <p id="medicine-count">0 активных</p>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showScreen('dashboard')">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </button>
            <button class="nav-btn" onclick="showScreen('statistics')">
                <i class="fas fa-chart-bar"></i>
                <span>Статистика</span>
            </button>
            <button class="nav-btn" onclick="showScreen('profile')">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <div id="notification" class="notification hidden">
        <p id="notification-message">Добавлено!</p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
